version: '3.8'

services:
  # PostgreSQL
  db:
    image: postgres:15-alpine
    container_name: dating_bot_db
    environment:
      POSTGRES_USER: dating_bot
      POSTGRES_PASSWORD: dating_bot_secret
      POSTGRES_DB: dating_bot
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - dating_bot_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dating_bot"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis
  redis:
    image: redis:7-alpine
    container_name: dating_bot_redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - dating_bot_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO (S3)
  minio:
    image: minio/minio:latest
    container_name: dating_bot_minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - dating_bot_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # Create bucket
  createbuckets:
    image: minio/mc:latest
    container_name: dating_bot_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      /usr/bin/mc alias set myminio http://minio:9000 minioadmin minioadmin;
      /usr/bin/mc mb --ignore-existing myminio/dating-bot;
      /usr/bin/mc policy set public myminio/dating-bot;
      exit 0;
      "
    networks:
      - dating_bot_network

  # Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dating_bot_backend
    environment:
      DATABASE_URL: postgresql://dating_bot:dating_bot_secret@db:5432/dating_bot
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: dating-bot
      JWT_SECRET: dev_secret_change_in_production
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - dating_bot_network
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload

networks:
  dating_bot_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:
