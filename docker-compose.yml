version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: dating_bot
      POSTGRES_PASSWORD: dating_bot_secret
      POSTGRES_DB: dating_bot
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - dating_bot_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dating_bot"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    networks:
      - dating_bot_network

  minio:
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data
    volumes:
      - minio_data:/data
    networks:
      - dating_bot_network

  createbuckets:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      /usr/bin/mc alias set myminio http://minio:9000 minioadmin minioadmin;
      /usr/bin/mc mb --ignore-existing myminio/dating-bot;
      exit 0;
      "
    networks:
      - dating_bot_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://dating_bot:dating_bot_secret@db:5432/dating_bot
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: dating-bot
      JWT_SECRET: ${JWT_SECRET}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_healthy
    networks:
      - dating_bot_network

networks:
  dating_bot_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:
