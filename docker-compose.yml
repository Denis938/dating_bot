version: '3.8'

services:
  # ====================
  # PostgreSQL Database
  # ====================
  db:
    image: postgres:15-alpine
    container_name: dating_bot_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dating_bot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dating_bot_secret}
      POSTGRES_DB: ${POSTGRES_DB:-dating_bot}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - dating_bot_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dating_bot}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ====================
  # Redis Cache
  # ====================
  redis:
    image: redis:7-alpine
    container_name: dating_bot_redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - dating_bot_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ====================
  # MinIO (S3-compatible storage)
  # ====================
  minio:
    image: minio/minio:latest
    container_name: dating_bot_minio
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - dating_bot_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # ====================
  # Create MinIO Bucket
  # ====================
  createbuckets:
    image: minio/mc:latest
    container_name: dating_bot_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      /usr/bin/mc alias set myminio http://minio:9000 ${S3_ACCESS_KEY:-minioadmin} ${S3_SECRET_KEY:-minioadmin};
      /usr/bin/mc mb --ignore-existing myminio/${S3_BUCKET:-dating-bot};
      /usr/bin/mc policy set public myminio/${S3_BUCKET:-dating-bot};
      exit 0;
      "
    networks:
      - dating_bot_network

  # ====================
  # Backend API (FastAPI)
  # ====================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dating_bot_backend
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-dating_bot}:${POSTGRES_PASSWORD:-dating_bot_secret}@db:5432/${POSTGRES_DB:-dating_bot}
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: minio:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
      S3_BUCKET: ${S3_BUCKET:-dating-bot}
      JWT_SECRET: ${JWT_SECRET:-dev_secret_change_in_production}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - dating_bot_network
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload

  # ====================
  # Telegram Bot
  # ====================
  telegram_bot:
    build:
      context: ./bot
      dockerfile: Dockerfile
    container_name: dating_bot_telegram
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      API_URL: http://backend:8000
    depends_on:
      - backend
    networks:
      - dating_bot_network
    restart: unless-stopped

networks:
  dating_bot_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:
